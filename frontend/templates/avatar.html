<div id="main-content">
    <div class="avatar-page">

        <button class="avatar-back">✕</button>

        <div class="avatar-full" style="background-color: {{ user.avatar_random_color|default:'#cccccc' }};">
            {% if user.avatar %}
                <img src="{{ user.avatar.url }}" class="avatar-img">
            {% else %}
                <span class="avatar-letter">
                    {{ user.username|first|default:'U' }}
                </span>
            {% endif %}
        </div>

        <div class="avatar-actions">
            <input type="file" id="avatar-input"
                   accept="image/jpeg,image/png,image/webp,image/gif"
                   style="display:none">

            <button id="gallery-btn" class="avatar-action-btn">Галерея</button>
            <button id="telegram-btn" class="avatar-action-btn">Telegram</button>
            <button id="delete-btn" class="avatar-action-btn">Удалить аватар</button>
        </div>

    </div>
</div>
